<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Siswa Firestore</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h1>Daftar Siswa</h1>

    <form id="formSiswa">

        <input
            type="text"
            id="nama"
            placeholder="Nama Siswa"
            required
        >

        <input
            type="text"
            id="kelas"
            placeholder="Kelas"
            required
        >

        <button type="submit">
            Simpan
        </button>

    </form>

    <hr>

    <h2>Data Siswa</h2>

    <div id="listSiswa"></div>

</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
